version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: banking_postgres_dev
    environment:
      POSTGRES_DB:       banking_agent
      POSTGRES_USER:     banking_user
      POSTGRES_PASSWORD: banking_pass
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking_user -d banking_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: banking_redis_dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: banking_backend_dev
    env_file: .env
    environment:
      DATABASE_URL:      postgresql+asyncpg://banking_user:banking_pass@postgres:5432/banking_agent
      DATABASE_URL_SYNC: postgresql://banking_user:banking_pass@postgres:5432/banking_agent
      REDIS_URL:         redis://redis:6379/0
    volumes:
      - ./backend:/app              # hot reload — mounts source code
      - ./data:/app/data
      - ./logs:/app/logs
      - huggingface_cache:/root/.cache
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: banking_frontend_dev
    working_dir: /app
    volumes:
      - ./frontend:/app             # hot reload
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data_dev:
  huggingface_cache: