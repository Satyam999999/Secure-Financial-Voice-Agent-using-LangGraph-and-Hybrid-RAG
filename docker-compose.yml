version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: banking_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       banking_agent
      POSTGRES_USER:     banking_user
      POSTGRES_PASSWORD: banking_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking_user -d banking_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: banking_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: banking_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL:      postgresql+asyncpg://banking_user:banking_pass@postgres:5432/banking_agent
      DATABASE_URL_SYNC: postgresql://banking_user:banking_pass@postgres:5432/banking_agent
      REDIS_URL:         redis://redis:6379/0
    volumes:
      - ./data:/app/data                # PDF + FAISS index persisted
      - ./logs:/app/logs                # logs persisted
      - huggingface_cache:/root/.cache  # model cache persisted
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: banking_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  huggingface_cache: